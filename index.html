<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8" />
    <title>Foodie Hunter</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <div class="chat">

        <!-- 標題列 -->
        <div class="chat-title">
            <div class="avatar">
                <img src="https://i.imgur.com/0y8Ftya.png" alt="avatar" />
            </div>
            <h1>Foodie Hunter</h1>
            <h2>你的都市找餐小幫手</h2>
        </div>

        <!-- 訊息區 -->
        <div class="messages">
            <div class="messages-content" id="messages"></div>
        </div>

        <!-- 推薦卡片區（獨立） -->
        <div class="recommendation-area" id="recommendationArea"></div>

        <!-- 輸入框 -->
        <div class="message-box">
            <textarea class="message-input" id="messageInput" placeholder="你現在想吃什麼呢？"></textarea>
            <button class="message-submit" id="sendButton">Send</button>
        </div>

    </div>
    kend

    <script src="script.js"></script>
</body>

</html>
